<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In / Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hides default browser eye icon */
        input::-ms-reveal, input::-ms-clear { display: none; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex items-center justify-center font-[Segoe UI] relative overflow-hidden">
        
    <div id="container" class="bg-white w-[95%] max-w-5xl h-[600px] rounded-[30px] shadow-2xl relative overflow-hidden group">
        
        <div class="absolute top-0 left-0 w-1/2 h-full flex flex-col p-12 transition-all duration-700 ease-in-out z-20 group-[.right-panel-active]:opacity-100">
            
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-3xl font-bold text-gray-800">Log In</h2>
                <div class="flex gap-4">
                    <a href="#" class="hover:opacity-70 transition"><img src="facebook.svg" alt="Facebook" class="w-6 h-6"></a>
                    <a href="#" class="hover:opacity-70 transition"><img src="twitter.svg" alt="Twitter" class="w-6 h-6"></a>
                </div>
            </div>

            <form class="space-y-6 mt-auto mb-auto" onsubmit="handleLogin(event)">
                <div>
                    <label class="block font-bold text-gray-800 mb-2">Email</label>
                    <input id="loginEmail" type="email" required placeholder="sample@gmail.com" class="w-full px-6 py-3 border border-gray-300 rounded-full focus:outline-none focus:border-[#659492] text-gray-600">
                </div>
                <div>
                    <label class="block font-bold text-gray-800 mb-2">Password</label>
                    <div class="relative">
                        <input id="loginPass" type="password" required placeholder="**********" class="w-full px-6 py-3 border border-gray-300 rounded-full focus:outline-none focus:border-[#659492] text-gray-600 pr-12">
                        <button type="button" onclick="togglePass('loginPass')" class="absolute right-5 top-1/2 -translate-y-1/2 cursor-pointer outline-none transition hover:opacity-70">
                            <img src="Eye.svg" alt="Show" class="w-6 h-6 opacity-60">
                        </button>
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <label class="flex items-center text-gray-600 font-medium cursor-pointer">
                        <input type="checkbox" class="mr-2 w-4 h-4 accent-[#659492]"> Remember Me
                    </label>
                    <a href="#" class="text-gray-400 hover:text-[#659492] font-medium transition">Forgot Password</a>
                </div>
                <div class="pt-2 flex justify-center">
                    <button type="submit" class="px-10 py-3 bg-[#659492] hover:bg-[#537a78] text-white font-bold rounded-full shadow-lg transition transform hover:-translate-y-0.5 w-full">Log In</button>
                </div>
            </form>
        </div>

        <div class="absolute top-0 right-0 w-1/2 h-full flex flex-col p-12 transition-all duration-700 ease-in-out z-20 group-[.right-panel-active]:opacity-100">
            
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-3xl font-bold text-gray-800">Sign Up</h2>
                <div class="flex gap-4">
                    <a href="#" class="hover:opacity-70 transition"><img src="facebook.svg" alt="Facebook" class="w-6 h-6"></a>
                    <a href="#" class="hover:opacity-70 transition"><img src="twitter.svg" alt="Twitter" class="w-6 h-6"></a>
                </div>
            </div>

            <form class="space-y-3 mt-auto mb-auto" onsubmit="handleSignup(event)">
                <div>
                    <label class="block font-bold text-gray-800 mb-2">Email</label>
                    <input id="signupEmail" type="email" required placeholder="sample@gmail.com" class="w-full px-6 py-3 border border-gray-300 rounded-full focus:outline-none focus:border-[#659492] text-gray-600">
                </div>
                <div>
                    <label class="block font-bold text-gray-800 mb-2">Password</label>
                    <div class="relative">
                        <input id="signupPass" type="password" required placeholder="**********" class="w-full px-6 py-3 border border-gray-300 rounded-full focus:outline-none focus:border-[#659492] text-gray-600 pr-12">
                        <button type="button" onclick="togglePass('signupPass')" class="absolute right-5 top-1/2 -translate-y-1/2 cursor-pointer outline-none transition hover:opacity-70">
                            <img src="Eye.svg" alt="Show" class="w-6 h-6 opacity-60">
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block font-bold text-gray-800 mb-2">Username</label>
                    <input id="signupUsername" type="text" required placeholder="sampleUser123" class="w-full px-6 py-3 border border-gray-300 rounded-full focus:outline-none focus:border-[#659492] text-gray-600">
                </div>
                <div class="pt-4 flex justify-end">
                    <button type="submit" class="px-10 py-3 bg-[#659492] hover:bg-[#537a78] text-white font-bold rounded-full shadow-lg transition transform hover:-translate-y-0.5">Sign Up</button>
                </div>
            </form>
        </div>

        <div class="absolute top-0 left-0 w-1/2 h-full bg-[#659492] z-40 transition-transform duration-700 ease-in-out group-[.right-panel-active]:translate-x-full">
            <div class="relative w-full h-full flex items-center justify-center p-12 text-center text-white">
                
                <div class="absolute w-full px-12 transition-opacity duration-700 ease-in-out group-[.right-panel-active]:opacity-0 pointer-events-none group-[.right-panel-active]:pointer-events-none opacity-100 pointer-events-auto">
                    <h1 class="text-4xl font-extrabold mb-4 tracking-wide">Welcome to Sign Up</h1>
                    <p class="text-white/80 font-medium mb-8">Have an account?</p>
                    <button id="signInBtn" class="px-12 py-3 bg-white text-[#659492] font-bold rounded-full shadow-lg hover:bg-gray-100 transition transform hover:scale-105">Log In</button>
                </div>

                <div class="absolute w-full px-12 transition-opacity duration-700 ease-in-out opacity-0 group-[.right-panel-active]:opacity-100 pointer-events-none group-[.right-panel-active]:pointer-events-auto">
                    <h1 class="text-4xl font-extrabold mb-4 tracking-wide">Welcome to Log In</h1>
                    <p class="text-white/80 font-medium mb-8">Don't have an account?</p>
                    <button id="signUpBtn" class="px-12 py-3 bg-white text-[#659492] font-bold rounded-full shadow-lg hover:bg-gray-100 transition transform hover:scale-105">Sign Up</button>
                </div>

            </div>
        </div>

    </div>

    <script>
        const signInBtn = document.getElementById('signInBtn');
        const signUpBtn = document.getElementById('signUpBtn');
        const container = document.getElementById('container');

        // 1. Toggle Panel (Slide Effect)
        signUpBtn.addEventListener('click', () => { container.classList.remove("right-panel-active"); });
        signInBtn.addEventListener('click', () => { container.classList.add("right-panel-active"); });

        // 2. Toggle Password Visibility
        function togglePass(id) {
            var x = document.getElementById(id);
            x.type = x.type === "password" ? "text" : "password";
        }

        // 3. Handle Login (Runs ONLY if valid)
        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPass').value;

            try {
                const response = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('userId', data.id);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('role', data.role || 'customer');
                    alert('Login successful!');
                    if (data.role === 'admin') {
                        window.location.href = '/admin/overview.html';
                    } else {
                        window.location.href = '../user/profile.html';
                    }
                } else {
                    alert(data.error || 'Login failed');
                }
            } catch (error) {
                alert('Error connecting to server: ' + error.message);
                console.error('Login error:', error);
            }
        }

        // 4. Handle Signup (Runs ONLY if valid)
        async function handleSignup(event) {
            event.preventDefault();
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPass').value;
            const username = document.getElementById('signupUsername').value;

            try {
                const response = await fetch('http://localhost:3000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    alert('Sign up successful! Please log in.');
                    container.classList.remove("right-panel-active");
                } else {
                    alert(data.error || 'Sign up failed');
                }
            } catch (error) {
                alert('Error connecting to server: ' + error.message);
                console.error('Signup error:', error);
            }
        }
    </script>
</body>
</html>
